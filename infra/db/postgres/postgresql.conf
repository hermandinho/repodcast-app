# Tuned for an 8 GB VPS. Rule of thumb: shared_buffers ~25% of RAM,
# effective_cache_size ~75% of RAM.
#
# Reload after changes:
#   docker compose --env-file .env -p repodcast-db-prod exec postgres \
#     psql -U "$POSTGRES_USER" -c 'SELECT pg_reload_conf();'
# (shared_buffers and max_connections require a full restart, not a reload.)

# --- Connections ------------------------------------------------------------
listen_addresses = '*'
max_connections = 100

# --- Memory -----------------------------------------------------------------
shared_buffers = 2GB
effective_cache_size = 6GB
work_mem = 32MB
maintenance_work_mem = 512MB

# --- Write-ahead log --------------------------------------------------------
wal_level = replica
max_wal_size = 2GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9

# --- Parallelism ------------------------------------------------------------
max_worker_processes = 4
max_parallel_workers = 4
max_parallel_workers_per_gather = 2

# --- Random page cost (SSD) -------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200

# --- Logging ----------------------------------------------------------------
log_min_duration_statement = 500ms
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%m [%p] %q%u@%d '
log_timezone = 'UTC'

# --- Stats ------------------------------------------------------------------
track_io_timing = on

# --- TLS --------------------------------------------------------------------
# Postgres does NOT terminate TLS — PgBouncer does that at the public port.
# Traffic between pgbouncer and postgres stays on the internal docker bridge,
# never reaches the public internet. Disabling here avoids Postgres's strict
# key-file ownership requirement (must be root or db user; renew.sh writes
# as `deploy`), which would otherwise crash the container.
ssl = off

# --- Auth -------------------------------------------------------------------
password_encryption = scram-sha-256

# --- Locale -----------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# --- Where pg_hba lives -----------------------------------------------------
# hba_file is passed as a CLI flag in docker-compose.yml so PGDATA can remain
# untouched by our config bind-mounts.
