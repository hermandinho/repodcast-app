# PostgreSQL Client Authentication Configuration.
#
# Rules are evaluated top-to-bottom; first match wins.
# See: https://www.postgresql.org/docs/17/auth-pg-hba-conf.html

# TYPE      DATABASE   USER   ADDRESS         METHOD

# ---- Local unix socket (inside the container) -----------------------------
local       all        all                    scram-sha-256

# ---- Docker bridge networks (pgbouncer, backup, cloudflared sidecars) -----
# Docker default bridge ranges. scram-sha-256 auth still required — this is
# NOT trust; we just skip TLS on the internal network.
host        all        all    172.16.0.0/12   scram-sha-256
host        all        all    192.168.0.0/16  scram-sha-256
host        all        all    10.0.0.0/8      scram-sha-256

# ---- Anything else: TLS required ------------------------------------------
# (In practice the container isn't exposed to the host network directly;
# these rules are belt-and-suspenders in case someone opens 5432 later.)
hostssl     all        all    0.0.0.0/0       scram-sha-256
hostssl     all        all    ::/0            scram-sha-256
hostnossl   all        all    0.0.0.0/0       reject
hostnossl   all        all    ::/0            reject
