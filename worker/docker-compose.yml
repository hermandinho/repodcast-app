# Single template used for both prod and staging.
#
# Invoke per-env with --env-file and --project-name:
#   docker compose --env-file .env -p repodcast-prod    up -d --build
#   docker compose --env-file .env -p repodcast-staging up -d --build
#
# `deploy.sh` (invoked by the Makefile) handles this — you should not
# need to run compose directly.

services:
  # BotGuard-backed PO token provider — the yt-dlp plugin
  # (bgutil-ytdlp-pot-provider, pip-installed inside the render image) hits
  # this sidecar over HTTP to mint the tokens YouTube's "Sign in to confirm
  # you're not a bot" gate demands. The provider caches sessions across
  # requests, so keeping it long-lived is much cheaper than the script-mode
  # variant that spawns a Node.js VM per yt-dlp invocation.
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    expose:
      - "4416"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4416/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  render:
    build: .
    image: repodcast-worker:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file: .env
    # No published ports — cloudflared reaches this over the compose network.
    # The `render` service name is what you configured in the tunnel's Public
    # Hostname (URL = http://render:8080).
    expose:
      - "8080"
    depends_on:
      bgutil-provider:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN missing from .env}
    depends_on:
      render:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
